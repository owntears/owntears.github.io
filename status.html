<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tears Hub - Status</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#0f1117;
      color:#e5e7eb;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:1150px;
      margin:auto;
      padding:24px;
    }

    .navbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#161a22;
      border:1px solid #232938;
      border-radius:18px;
      padding:14px 18px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo img{
      width:42px;
      height:42px;
      border-radius:50%;
    }

    .logo h1{
      font-size:1.05rem;
      font-weight:600;
      color:#f3f4f6;
    }

    .nav-links{
      display:flex;
      gap:10px;
    }

    .nav-links a{
      text-decoration:none;
      color:#cbd5e1;
      padding:10px 16px;
      border-radius:12px;
      transition:0.2s;
      font-size:0.95rem;
    }

    .nav-links a:hover{
      background:#1d2430;
    }

    .active{
      background:#202938;
      color:white !important;
    }

    .status-wrapper{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:80vh;
    }

    .status-card{
      width:100%;
      max-width:760px;
      background:#161a22;
      border:1px solid #232938;
      border-radius:24px;
      padding:34px;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:34px;
      gap:20px;
      flex-wrap:wrap;
    }

    .top h2{
      font-size:1.8rem;
      font-weight:600;
    }

    .status{
      display:flex;
      align-items:center;
      gap:10px;
      color:#cbd5e1;
      font-size:0.95rem;
    }

    .status svg{
      width:18px;
      height:18px;
      fill:#7c86ff;
    }

    .label{
      color:#9ca3af;
      margin-bottom:12px;
      font-size:0.95rem;
    }

    .progress-bar{
      width:100%;
      height:16px;
      background:#202938;
      border-radius:999px;
      overflow:hidden;
    }

    .progress{
      width:12%;
      height:100%;
      background:#7c86ff;
      border-radius:999px;
    }

    .percent{
      margin-top:14px;
      color:#d1d5db;
      font-size:0.95rem;
    }

    @media(max-width:700px){

      .navbar{
        flex-direction:column;
        gap:18px;
      }

      .top h2{
        font-size:1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <nav class="navbar">

      <div class="logo">
        <img src="https://github.com/owntears.png" alt="logo">
        <h1>Tears Hub</h1>
      </div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="status.html">Status</a>
      </div>

    </nav>

    <div class="status-wrapper">

      <div class="status-card">

        <div class="top">

          <h2>Website Progress</h2>

          <div class="status">

            <svg viewBox="0 0 24 24">
              <path d="M12 0L1.605 6v12L12 24l10.395-6V6L12 0zm0 2.4l8.1 4.7v9.4l-8.1 4.7-8.1-4.7V7.1L12 2.4z"/>
            </svg>

            <span>In Development</span>

          </div>

        </div>

        <div class="label">Current Progress</div>

        <div class="progress-bar">
          <div class="progress"></div>
        </div>

        <div class="percent">12%</div>

      </div>

    </div>

  </div>

</body>
</html>
