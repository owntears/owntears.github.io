<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tears Hub - Status</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <nav class="navbar">

      <div class="logo">
        <img src="https://github.com/owntears.png" alt="logo">
        <h1>Tears Hub</h1>
      </div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="status.html">Status</a>
      </div>

    </nav>

    <div class="status-wrapper">

      <div class="status-card">

        <div class="status-top">

          <h2>Website Progress</h2>

          <div class="status">

            <svg viewBox="0 0 24 24">
              <path d="M12 0L1.605 6v12L12 24l10.395-6V6L12 0zm0 2.4l8.1 4.7v9.4l-8.1 4.7-8.1-4.7V7.1L12 2.4z"/>
            </svg>

            <span>In Development</span>

          </div>

        </div>

        <div class="label">Current Progress</div>

        <div class="progress-bar">
          <div class="progress"></div>
        </div>

        <div class="percent">12%</div>

      </div>

    </div>

    <footer>
      © 2026 Tears Hub
    </footer>

  </div>

</body>
</html>
