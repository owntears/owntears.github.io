<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tears Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:
      radial-gradient(circle at top left, rgba(99,102,241,0.20), transparent 30%),
      radial-gradient(circle at bottom right, rgba(168,85,247,0.20), transparent 30%),
      #06070d;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    .navbar-wrapper{
      width:100%;
      display:flex;
      justify-content:center;
      padding-top:25px;
    }

    .navbar{
      width:90%;
      max-width:1100px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 26px;
      border-radius:22px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(18px);
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo img{
      width:50px;
      height:50px;
      border-radius:50%;
      border:2px solid rgba(99,102,241,0.45);
    }

    .logo h1{
      font-size:1.2rem;
      font-weight:700;
      background:linear-gradient(90deg,#60a5fa,#a855f7);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .nav-links{
      display:flex;
      gap:14px;
    }

    .nav-links a{
      color:#dbeafe;
      text-decoration:none;
      padding:10px 18px;
      border-radius:14px;
      transition:0.25s;
      font-weight:500;
    }

    .nav-links a:hover{
      background:rgba(255,255,255,0.06);
    }

    .active{
      background:linear-gradient(90deg,#2563eb,#7c3aed);
    }

    .hero{
      width:100%;
      min-height:85vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:50px 8%;
    }

    .hero-box{
      width:100%;
      max-width:1200px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:60px;
      align-items:center;
    }

    .hero-text h2{
      font-size:4.2rem;
      line-height:1.05;
      margin-bottom:20px;
    }

    .gradient{
      background:linear-gradient(90deg,#60a5fa,#a855f7);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero-text p{
      color:#94a3b8;
      font-size:1.08rem;
      line-height:1.7;
      max-width:520px;
      margin-bottom:35px;
    }

    .buttons{
      display:flex;
      gap:16px;
    }

    .btn{
      text-decoration:none;
      padding:14px 24px;
      border-radius:16px;
      transition:0.25s;
      font-weight:600;
    }

    .btn-primary{
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      box-shadow:0 0 25px rgba(99,102,241,0.30);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.03);
      color:#dbeafe;
    }

    .preview-card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:28px;
      padding:32px;
      backdrop-filter:blur(18px);
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    .preview-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .preview-top h3{
      font-size:1.4rem;
    }

    .status{
      display:flex;
      align-items:center;
      gap:10px;
      color:#cbd5e1;
      font-weight:500;
    }

    .status svg{
      width:20px;
      height:20px;
      fill:#60a5fa;
    }

    .progress-bar{
      width:100%;
      height:18px;
      border-radius:999px;
      background:#0f172a;
      overflow:hidden;
      margin-top:14px;
    }

    .progress{
      width:12%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#3b82f6,#8b5cf6);
      box-shadow:0 0 20px rgba(99,102,241,0.45);
    }

    .percent{
      margin-top:12px;
      color:#60a5fa;
      font-weight:600;
    }

    @media(max-width:900px){

      .hero-box{
        grid-template-columns:1fr;
      }

      .hero-text h2{
        font-size:3rem;
      }

      .navbar{
        flex-direction:column;
        gap:18px;
      }
    }
  </style>
</head>
<body>

  <div class="navbar-wrapper">
    <nav class="navbar">

      <div class="logo">
        <img src="https://github.com/owntears.png" alt="logo">
        <h1>Tears Hub</h1>
      </div>

      <div class="nav-links">
        <a class="active" href="index.html">Home</a>
        <a href="status.html">Status</a>
      </div>

    </nav>
  </div>

  <section class="hero">

    <div class="hero-box">

      <div class="hero-text">

        <h2>
          Modern.<br>
          Clean.<br>
          <span class="gradient">Tears Hub</span>
        </h2>

        <p>
         tears hub is a clean modern website for the Hobby Org "Crimson Labs" by owntears.
          Currently under Construction.
        </p>

        <div class="buttons">
          <a href="status.html" class="btn btn-primary">Open Status</a>
          <a href="https://github.com/owntears" class="btn btn-secondary">GitHub</a>
        </div>

      </div>

      <div class="preview-card">

        <div class="preview-top">

          <h3>Website Progress</h3>

          <div class="status">

            <svg role="img" viewBox="0 0 24 24">
              <path d="M12 0L1.605 6v12L12 24l10.395-6V6L12 0zm0 2.197l8.395 4.848v9.91L12 21.803l-8.395-4.848v-9.91L12 2.197z"/>
            </svg>

            <span>In Development</span>

          </div>

        </div>

        <p style="color:#94a3b8;">Current Progress</p>

        <div class="progress-bar">
          <div class="progress"></div>
        </div>

        <div class="percent">12%</div>

      </div>

    </div>

  </section>

</body>
</html>
