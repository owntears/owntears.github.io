<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Tears Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#0f1117;
      color:#e5e7eb;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:1150px;
      margin:auto;
      padding:24px;
    }

    .navbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#161a22;
      border:1px solid #232938;
      border-radius:18px;
      padding:14px 18px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo img{
      width:42px;
      height:42px;
      border-radius:50%;
    }

    .logo h1{
      font-size:1.05rem;
      font-weight:600;
      color:#f3f4f6;
    }

    .nav-links{
      display:flex;
      gap:10px;
    }

    .nav-links a{
      text-decoration:none;
      color:#cbd5e1;
      padding:10px 16px;
      border-radius:12px;
      transition:0.2s;
      font-size:0.95rem;
    }

    .nav-links a:hover{
      background:#1d2430;
    }

    .error-wrapper{
      min-height:80vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .error-card{
      width:100%;
      max-width:720px;
      background:#161a22;
      border:1px solid #232938;
      border-radius:24px;
      padding:42px;
      text-align:center;
    }

    .error-code{
      font-size:6rem;
      font-weight:700;
      color:#f3f4f6;
      letter-spacing:-4px;
      margin-bottom:12px;
    }

    .error-title{
      font-size:1.4rem;
      font-weight:600;
      margin-bottom:14px;
    }

    .error-text{
      color:#9ca3af;
      line-height:1.7;
      max-width:500px;
      margin:auto;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .btn{
      text-decoration:none;
      padding:13px 20px;
      border-radius:12px;
      font-weight:500;
      transition:0.2s;
      font-size:0.95rem;
    }

    .btn-primary{
      background:#202938;
      border:1px solid #2a3344;
      color:white;
    }

    .btn-primary:hover{
      background:#2a3344;
    }

    .btn-secondary{
      background:#161a22;
      border:1px solid #232938;
      color:#cbd5e1;
    }

    .btn-secondary:hover{
      background:#1b2130;
    }

    @media(max-width:700px){

      .navbar{
        flex-direction:column;
        gap:18px;
      }

      .error-code{
        font-size:4.5rem;
      }

      .error-card{
        padding:32px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <nav class="navbar">

      <div class="logo">
        <img src="https://github.com/owntears.png" alt="logo">
        <h1>Tears Hub</h1>
      </div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="status.html">Status</a>
      </div>

    </nav>

    <div class="error-wrapper">

      <div class="error-card">

        <div class="error-code">
          404
        </div>

        <div class="error-title">
          Page not found
        </div>

        <div class="error-text">
          The page you are looking for does not exist
          or may have been moved.
        </div>

        <div class="buttons">
          <a href="index.html" class="btn btn-primary">Back Home</a>
          <a href="status.html" class="btn btn-secondary">Website Status</a>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
